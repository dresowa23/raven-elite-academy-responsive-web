<main>
    
    <div class="container my-5">
        <div class="row g-4">
            <h4 class="title">Contacta con nosotros</h4>
            <div class="col-lg-6 col-sm-12 ">
                    <form id="contactForm"  class="formulario" method="post">
                    <div class="form-grid">
                    <div class="form-item">
                        <label for="nombre">Nombre: </label>
                        <input type="text" name="nombre" id="nombre" placeholder="Escribe tu nombre" required>
                    </div>
                    <div class="form-item">
                        <label for="apellido">Apellidos: </label>
                        <input type="text" name="apellido" id="apellido" placeholder="Escribe tu apellido" required>
                    </div>
                    <div class="form-item">
                        <label for="email">Email: </label>
                        <input type="email" name="email" id="email" placeholder="Ejemplo: mail@gmail.com" required>
                    </div>
                    <div class="form-item">
                        <label for="telefono">Telefono: </label>
                        <input type="tel" name="telefono" id="telefono" placeholder="Ejemplo: 987248293" required>
                    </div>
                    <div class="form-item full">
                    <label for="mensaje">Comentarios:</label>
                    <textarea id="mensaje" name="mensaje" cols="30" rows="4"></textarea>
                    </div>
                    <div class="form-buttons">
                    <button type="reset" >Borrar</button>
                    <button type="submit">Enviar</button>
                    </div>
                    </div>
                    </form>
            </div>

            <div class="col-lg-6">
                <div id="map">
                <p id="mapMsg" class="map-msg"></p>
                </div>
            </div>
        </div>
    </div>
</main>
